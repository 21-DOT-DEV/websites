name: Generate DocC Documentation

on:
  workflow_call:
    inputs:
      project-name:
        description: 'Documentation project name (e.g., docs-21-dev)'
        required: true
        type: string
    outputs:
      artifact-name:
        description: 'Name of the uploaded documentation artifact'
        value: ${{ jobs.generate.outputs.artifact-name }}

jobs:
  generate:
    name: Generate Documentation
    runs-on: macos-26
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: "/Applications/Xcode_26.4.app/Contents/Developer"
    outputs:
      artifact-name: ${{ inputs.project-name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Resolve dependencies
        run: swift package resolve
      
      - name: Extract docs-site archive versions
        run: |
          set -e
          ARCHIVES_FILE="Resources/${{ inputs.project-name }}/external-archives.json"

          if [ ! -f "$ARCHIVES_FILE" ]; then
            echo "ℹ️  No external-archives.json found at $ARCHIVES_FILE; skipping"
            exit 0
          fi

          # SECP256K1_VERSION is the docs-site pin (may be a prerelease), used for llms.txt stamping.
          # It is sourced from the P256K archive entry; the ZKP entry is expected to share the same tag.
          # Keys must match the short-form keys in external-archives.json (p256k/event/openssl/tor).
          SECP256K1_VERSION=$(jq -r '.archives["p256k"].tag' "$ARCHIVES_FILE")
          EVENT_VERSION=$(jq -r '.archives["event"].tag' "$ARCHIVES_FILE")
          OPENSSL_VERSION=$(jq -r '.archives["openssl"].tag' "$ARCHIVES_FILE")
          TOR_VERSION=$(jq -r '.archives["tor"].tag' "$ARCHIVES_FILE")

          # Fail fast if any required key is missing or null — prevents stamping `vnull`
          # placeholders into llms.txt and shipping broken version strings to the live site.
          for var in SECP256K1_VERSION EVENT_VERSION OPENSSL_VERSION TOR_VERSION; do
            value="${!var}"
            if [ -z "$value" ] || [ "$value" = "null" ]; then
              echo "❌ $var is missing or null in $ARCHIVES_FILE — refusing to stamp llms.txt"
              exit 1
            fi
          done

          echo "SECP256K1_VERSION=$SECP256K1_VERSION" >> $GITHUB_ENV
          echo "EVENT_VERSION=$EVENT_VERSION" >> $GITHUB_ENV
          echo "OPENSSL_VERSION=$OPENSSL_VERSION" >> $GITHUB_ENV
          echo "TOR_VERSION=$TOR_VERSION" >> $GITHUB_ENV

          echo "� swift-secp256k1 (docs): $SECP256K1_VERSION"
          echo "📦 swift-event:             $EVENT_VERSION"
          echo "📦 swift-openssl:           $OPENSSL_VERSION"
          echo "📦 swift-tor:               $TOR_VERSION"

      - name: Download external DocC archives
        run: |
          set -e
          ARCHIVES_FILE="Resources/${{ inputs.project-name }}/external-archives.json"

          if [ ! -f "$ARCHIVES_FILE" ]; then
            echo "ℹ️  No external-archives.json found; skipping external archive downloads"
            exit 0
          fi

          mkdir -p /tmp/archives

          for key in $(jq -r '.archives | keys[]' "$ARCHIVES_FILE"); do
            repo=$(jq -r ".archives[\"$key\"].repo" "$ARCHIVES_FILE")
            tag=$(jq -r ".archives[\"$key\"].tag" "$ARCHIVES_FILE")
            artifact=$(jq -r ".archives[\"$key\"].artifact" "$ARCHIVES_FILE")
            sha=$(jq -r ".archives[\"$key\"].sha256" "$ARCHIVES_FILE")

            url="https://github.com/${repo}/releases/download/${tag}/${artifact}"
            dest="/tmp/archives/${artifact}"

            echo "📥 Downloading ${key}@${tag}..."
            echo "   URL: $url"
            curl -L --retry 3 --fail -o "$dest" "$url"

            echo "🔐 Verifying SHA-256 for ${key}..."
            echo "${sha}  ${dest}" | shasum -a 256 -c -

            echo "📦 Unzipping ${key}..."
            # -o: overwrite without prompting (archives ship with top-level LICENSE/README
            # that collide across packages; we only consume the *.doccarchive directories).
            (cd /tmp/archives && unzip -o -q "${artifact}" && rm "${artifact}")
          done

          echo "✅ All external archives downloaded, verified, and unzipped"
          ls -la /tmp/archives/

      - name: Merge DocC archives
        run: |
          set -e
          project="${{ inputs.project-name }}"
          output_dir="./Websites/${project}"

          echo "🔀 Merging DocC archives..."

          shopt -s nullglob
          archives=(/tmp/archives/*.doccarchive)
          shopt -u nullglob

          if [ ${#archives[@]} -eq 0 ]; then
            echo "❌ No .doccarchive directories found in /tmp/archives/"
            exit 1
          fi

          echo "Archives to merge:"
          printf '  - %s\n' "${archives[@]}"

          # Inputs are already --transform-for-static-hosting --experimental-transform-for-static-hosting-with-content
          # archives; `docc merge` preserves their per-page <noscript> HTML verbatim. Do NOT follow this with
          # `docc process-archive transform-for-static-hosting` — that subcommand has no --with-content option
          # and regenerates empty-shell index.html files, silently stripping the embedded per-page content.
          rm -rf "$output_dir"
          mkdir -p "$(dirname "$output_dir")"
          xcrun docc merge \
            "${archives[@]}" \
            --output-path "$output_dir"

          echo "✅ Merge complete: $output_dir"
      
      - name: Verify documentation output
        run: |
          project="${{ inputs.project-name }}"
          echo "Checking documentation output..."
          ls -la Websites/${project}/
          
          # Verify index.html exists
          if [ ! -f "Websites/${project}/index.html" ]; then
            echo "Error: index.html not found in documentation output"
            exit 1
          fi
          
          # Verify documentation directory exists
          if [ ! -d "Websites/${project}/documentation" ]; then
            echo "Error: documentation directory not found"
            exit 1
          fi
          
          # Verify JavaScript directory exists (for search functionality)
          if [ ! -d "Websites/${project}/js" ]; then
            echo "Error: js directory not found (search functionality missing)"
            exit 1
          fi
          
          echo "✅ Documentation output verified successfully"
          echo "📊 Documentation size: $(du -sh Websites/${project} | cut -f1)"
      
      - name: Verify markdown output
        run: |
          project="${{ inputs.project-name }}"
          md_count=$(find "Websites/${project}" -name "*.md" | wc -l | tr -d ' ')
          echo "📊 Markdown files found: ${md_count}"
          
          if [ "$md_count" -eq 0 ]; then
            echo "❌ Error: No markdown files found — --enable-experimental-markdown-output may not be working"
            exit 1
          fi
          
          echo "✅ Markdown output verified (${md_count} files)"
          
      - name: Verify noscript content
        run: |
          set -e
          project="${{ inputs.project-name }}"
          # Spot-check a documentation page for real per-page <noscript> content.
          # An archive produced without --experimental-transform-for-static-hosting-with-content
          # (or re-transformed by `docc process-archive transform-for-static-hosting`, which lacks
          # a --with-content option) ships a ~1573-byte empty-shell index.html containing the literal
          # phrase "This page requires JavaScript."  Fail on that string so a silent regression cannot recur.
          sample_page=$(find "Websites/${project}/documentation" \
            -name "index.html" -not -path "*/documentation/index.html" | head -1)

          if [ -z "$sample_page" ]; then
            echo "⚠️  No documentation pages found to verify"
            exit 0
          fi

          if ! grep -q '<noscript>' "$sample_page"; then
            echo "❌ <noscript> tag missing from: $sample_page"
            exit 1
          fi

          if grep -q 'This page requires JavaScript\.' "$sample_page"; then
            echo "❌ <noscript> block is the empty-shell fallback (missing per-page content)"
            echo "   Page: $sample_page"
            echo "   Size: $(wc -c < "$sample_page" | tr -d ' ') bytes (expected >> 1573)"
            echo "   Cause: input archive was built without --experimental-transform-for-static-hosting-with-content,"
            echo "          or a downstream step re-ran \`docc process-archive transform-for-static-hosting\` and stripped content."
            exit 1
          fi

          page_size=$(wc -c < "$sample_page" | tr -d ' ')
          echo "✅ <noscript> contains per-page content in: $sample_page (${page_size} bytes)"
          # Show a preview of what crawlers will see
          sed -n '/<noscript>/,/<\/noscript>/p' "$sample_page" | head -20
      
      - name: Copy static resources
        run: |
          project="${{ inputs.project-name }}"
          output_dir="Websites/${project}"
          resources_dir="Resources/${project}"
          
          echo "📋 Copying static resources for ${project}..."
          
          # Select environment-specific headers based on branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🔒 Production build: using _headers.prod"
            header_source="${resources_dir}/_headers.prod"
          else
            echo "🔓 Preview build: using _headers.dev"
            header_source="${resources_dir}/_headers.dev"
          fi
          
          if [ ! -f "$header_source" ]; then
            echo "❌ Error: Header file not found: $header_source"
            exit 1
          fi
          
          cp "$header_source" "${output_dir}/_headers"
          echo "✅ Copied $header_source → ${output_dir}/_headers"
          
          # Copy other static resources (excluding _headers variants)
          if [ -d "${resources_dir}" ]; then
            file_count=0
            for item in "${resources_dir}"/*; do
              name="$(basename "$item")"
              # Skip _headers files (already handled above), functions/ (deployed as sibling), and wrangler.toml (local dev config)
              if [[ "$name" == _headers* ]] || [[ "$name" == "functions" ]] || [[ "$name" == "wrangler.toml" ]]; then
                continue
              fi
              if [ -d "$item" ]; then
                cp -R "$item" "${output_dir}/"
                echo "✅ Copied $name/"
                ((file_count++))
              elif [ -f "$item" ]; then
                cp "$item" "${output_dir}/"
                echo "✅ Copied $name"
                ((file_count++))
              fi
            done
            
            if [ "$file_count" -eq 0 ]; then
              echo "ℹ️  No additional static resources found in ${resources_dir}"
            else
              echo "✓ Copied ${file_count} additional static resource(s)"
            fi
          else
            echo "⚠️  Resources directory not found: ${resources_dir}"
          fi

          # Verify Cloudflare platform files are present
          declare -a platform_files=(
            "${output_dir}/_headers"
            "${output_dir}/_routes.json"
            "${output_dir}/_redirects"
          )
          
          missing=()
          for path in "${platform_files[@]}"; do
            if [ ! -f "$path" ]; then
              missing+=("$path")
            fi
          done
          
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Error: Missing Cloudflare platform files:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "✅ All Cloudflare platform files present"
      
      - name: Stamp versions in llms.txt files
        run: |
          project="${{ inputs.project-name }}"

          # Find all llms.txt files (root + per-module) and substitute per-package version placeholders.
          # Placeholders: {{SECP256K1_VERSION}}, {{EVENT_VERSION}}, {{OPENSSL_VERSION}}, {{TOR_VERSION}}.
          stamped=0
          while IFS= read -r llms_file; do
            # NOTE: sed -i '' is macOS-specific (macos-26 runner).
            # GNU sed on Linux treats '' as a filename — use sed -i instead if migrating.
            sed -i '' \
              -e "s/{{SECP256K1_VERSION}}/${{ env.SECP256K1_VERSION }}/g" \
              -e "s/{{EVENT_VERSION}}/${EVENT_VERSION:-MISSING_EVENT_VERSION}/g" \
              -e "s/{{OPENSSL_VERSION}}/${OPENSSL_VERSION:-MISSING_OPENSSL_VERSION}/g" \
              -e "s/{{TOR_VERSION}}/${TOR_VERSION:-MISSING_TOR_VERSION}/g" \
              "$llms_file"

            # Guard: fail if any known placeholder wasn't substituted.
            if grep -qE '\{\{(SECP256K1_VERSION|EVENT_VERSION|OPENSSL_VERSION|TOR_VERSION)\}\}' "$llms_file"; then
              echo "❌ Version placeholder was not substituted in ${llms_file}"
              grep -nE '\{\{(SECP256K1_VERSION|EVENT_VERSION|OPENSSL_VERSION|TOR_VERSION)\}\}' "$llms_file"
              exit 1
            fi
            stamped=$((stamped + 1))
            echo "  ✅ ${llms_file}"
          done < <(find "Websites/${project}" -name "llms.txt" -type f)

          if [ "$stamped" -eq 0 ]; then
            echo "ℹ️  No llms.txt files found for ${project}, skipping version stamp"
          else
            echo "✅ Versions stamped in ${stamped} file(s)"
            echo "   swift-secp256k1: v${{ env.SECP256K1_VERSION }}"
            echo "   swift-event: v${EVENT_VERSION:-MISSING}"
            echo "   swift-openssl: v${OPENSSL_VERSION:-MISSING}"
            echo "   swift-tor: v${TOR_VERSION:-MISSING}"
          fi
      
      - name: Fix canonical URLs
        run: |
          project="${{ inputs.project-name }}"
          output_dir="Websites/${project}"
          # Derive base URL: docs-21-dev → https://docs.21.dev
          BASE_URL="https://${project//-/.}"
          
          echo "🔗 Fixing canonical URLs for ${project}..."
          echo "   Base URL: $BASE_URL"
          echo "   Path: $output_dir"
          
          # Fix missing canonical tags (auto-verifies after fixing)
          swift run util canonical fix \
            --path "$output_dir" \
            --base-url "$BASE_URL"
      
      - name: Inject agent directives
        run: |
          project="${{ inputs.project-name }}"
          output_dir="Websites/${project}"
          BASE_URL="https://${project//-/.}"
          
          echo "🤖 Injecting agent directives for ${project}..."
          echo "   Base URL: $BASE_URL"
          echo "   Path: $output_dir"
          
          # Inject directives (auto-verifies after injection)
          swift run util agent-directive inject \
            --path "$output_dir" \
            --base-url "$BASE_URL" \
            --force
      
      - name: Audit indexability allowlist (advisory)
        run: |
          project="${{ inputs.project-name }}"
          output_dir="Websites/${project}"
          archives_root="${output_dir}/data/documentation"
          registry_path="Resources/${project}/external-archives.json"

          echo "🔍 Auditing indexability allowlist against authored DocC prose..."

          # Advisory: never fails the build. The registry is the editorial
          # source of truth; audit findings are suggestions for the next
          # archive-bump PR. To enforce, append `--strict` to the swift run
          # invocation below (and drop the `set +e` / `set -e` wrapping).
          #
          # Bidirectional drift detection (per SEO best practices):
          #   - STALE: allowlisted pages that no longer pass the policy.
          #     SEO-critical — thin pages in the sitemap risk Helpful Content
          #     demotion that affects the whole domain.
          #   - NEW: pages that pass policy but aren't in the allowlist.
          #     Editorial — single-page traffic loss, not site-wide harm.
          if [ ! -f "$registry_path" ]; then
            echo "ℹ️  No registry at $registry_path — skipping audit"
            exit 0
          fi

          set +e
          swift run util agent-directive audit \
            --archives-root "$archives_root" \
            --registry "$registry_path" \
            | tee /tmp/audit.log
          set -e

          # Extract gap counts from the per-entry lines:
          #   "    ⚠ documentation/..." → stale entry
          #   "    + documentation/..." → newly-discovered entry
          stale_count=$(grep -cE '^[[:space:]]+⚠' /tmp/audit.log || true)
          new_count=$(grep -cE '^[[:space:]]+\+' /tmp/audit.log || true)

          if [ "$stale_count" -gt 0 ] || [ "$new_count" -gt 0 ]; then
            {
              echo "## 🔍 Indexability drift: ${stale_count} stale, ${new_count} new"
              echo ""

              if [ "$stale_count" -gt 0 ]; then
                echo "### ⚠️ Stale entries (${stale_count}) — SEO priority"
                echo ""
                echo "These pages are in \`external-archives.json\`'s \`indexablePages\`"
                echo "but the authored prose has fallen below policy thresholds. They"
                echo "are currently in the sitemap as thin content, which can trigger"
                echo "Google Helpful Content demotion across the whole domain."
                echo ""
                echo "**Action**: remove from \`indexablePages\` in the next registry PR."
                echo ""
                echo '```'
                grep -E '^[[:space:]]+⚠' /tmp/audit.log
                echo '```'
                echo ""
              fi

              if [ "$new_count" -gt 0 ]; then
                echo "### ➕ Newly-eligible pages (${new_count}) — editorial polish"
                echo ""
                echo "These pages cross the hybrid-policy threshold but aren't yet"
                echo "in the allowlist. They are currently \`noindex\` and excluded"
                echo "from the sitemap (single-page traffic loss, not site-wide)."
                echo ""
                echo "**Action**: review and add to \`indexablePages\` if they belong in search."
                echo ""
                echo '```'
                grep -E '^[[:space:]]+\+' /tmp/audit.log
                echo '```'
                echo ""
              fi

              echo "Re-run locally:"
              echo '```'
              echo 'nocorrect swift run util agent-directive audit'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$stale_count" -gt 0 ]; then
              echo "⚠️  ${stale_count} stale allowlist entr$([ "$stale_count" = "1" ] && echo "y" || echo "ies") recorded in run summary (SEO priority)"
            fi
            if [ "$new_count" -gt 0 ]; then
              echo "📋 ${new_count} newly-eligible page(s) recorded in run summary"
            fi
          else
            echo "✅ Allowlist matches authored prose in both directions — no drift"
          fi
      
      - name: Generate 404 page
        run: |
          project="${{ inputs.project-name }}"
          output_dir="Websites/${project}"
          BASE_URL="https://${project//-/.}"
          source="${output_dir}/index.html"
          target="${output_dir}/404.html"

          if [ ! -f "$source" ]; then
            echo "⚠️  Root index.html not found, skipping 404 generation"
            exit 0
          fi

          echo "📄 Generating 404.html for ${project}..."

          # Copy SPA shell as 404 page
          cp "$source" "$target"

          # Remove canonical tag (wrong URL when served as 404)
          # NOTE: sed -i '' is macOS-specific (macos-26 runner).
          # GNU sed on Linux treats '' as a filename — use sed -i instead if migrating.
          sed -i '' '/<link rel="canonical"/d' "$target"

          # Add noindex + llms-txt before </head>
          sed -i '' "s|</head>|<meta name=\"robots\" content=\"noindex, follow\" />\n <link rel=\"llms-txt\" href=\"${BASE_URL}/llms.txt\" />\n </head>|" "$target"

          # Verify tags were injected
          if ! grep -q 'name="robots"' "$target"; then
            echo "❌ Failed to inject robots meta tag"
            exit 1
          fi
          if ! grep -q 'rel="llms-txt"' "$target"; then
            echo "❌ Failed to inject llms-txt link"
            exit 1
          fi
          if grep -q 'rel="canonical"' "$target"; then
            echo "❌ Failed to remove canonical tag"
            exit 1
          fi

          echo "✅ 404.html generated with noindex + llms-txt, canonical removed"
      
      - name: Generate sitemap
        run: |
          project="${{ inputs.project-name }}"
          echo "🗺️  Generating sitemap for ${project}..."
          
          # Use util CLI to generate sitemap (HTML documentation pages only, excludes noindex)
          swift run util sitemap generate --site "${project}" --verbose
          
          # Validate sitemap was generated and is not empty
          sitemap_file="Websites/${project}/sitemap.xml"
          if [ ! -f "$sitemap_file" ]; then
            echo "❌ Error: Sitemap file not created"
            exit 1
          fi
          
          url_count=$(grep -c "<loc>" "$sitemap_file" || echo "0")
          echo "📄 Sitemap location: ${sitemap_file}"
          echo "📊 HTML URLs in sitemap: ${url_count}"
          
          if [ "$url_count" -eq 0 ]; then
            echo "❌ Error: Sitemap contains no URLs"
            exit 1
          fi
      
      - name: Generate llms-full.txt files
        run: |
          project="${{ inputs.project-name }}"
          BASE_URL="https://${project//-/.}"
          
          # Discover markdown files from filesystem (decoupled from sitemap)
          md_urls=$(mktemp)
          find "Websites/${project}/data/documentation" -name "*.md" -type f \
            | sort \
            | while read -r file; do
                rel="${file#Websites/${project}/}"
                echo "${BASE_URL}/${rel}"
              done > "$md_urls"
          
          # --- Global llms-full.txt ---
          output="Websites/${project}/llms-full.txt"
          {
            echo "# docs.21.dev — Full Documentation Index"
            echo ""
            echo "> Complete list of all markdown documentation files for the swift-secp256k1 package."
            echo "> This is the comprehensive companion to llms.txt. See https://docs.21.dev/llms.txt for the curated overview."
            echo ""
            echo "## All Documentation (Markdown)"
            echo ""
          } > "$output"
          while read -r url; do
            path="${url#${BASE_URL}/data/documentation/}"
            path="${path%.md}"
            echo "- [${path}](${url})"
          done < "$md_urls" >> "$output"
          global_count=$(grep -c '^\- \[' "$output" || true)
          echo "📄 llms-full.txt generated with ${global_count} entries"
          
          # --- Per-module llms-full.txt ---
          # Dynamically discover modules from the generated documentation tree
          # (adapts automatically as pinned external archives are added/removed).
          for module_dir in "Websites/${project}/data/documentation/"*/; do
            [ -d "$module_dir" ] || continue
            module=$(basename "$module_dir")
            module_output="${module_dir}llms-full.txt"
            mkdir -p "$(dirname "$module_output")"
            {
              echo "# ${module} — Full Documentation Index"
              echo ""
              echo "> All markdown files for the ${module} module."
              echo "> See https://docs.21.dev/data/documentation/${module}/llms.txt for the curated overview."
              echo ""
              echo "## Documentation (Markdown)"
              echo ""
            } > "$module_output"
            grep "data/documentation/${module}/" "$md_urls" \
              | while read -r url; do
                  path="${url#${BASE_URL}/data/documentation/}"
                  path="${path%.md}"
                  echo "- [${path}](${url})"
                done >> "$module_output"
            module_count=$(grep -c '^\- \[' "$module_output" || true)
            if [ "$module_count" -eq 0 ]; then
              echo "⚠️  ${module}/llms-full.txt has no entries"
            else
              echo "📄 ${module}/llms-full.txt generated with ${module_count} entries"
            fi
          done
          
          rm -f "$md_urls"
          
          # Guard: fail if global has no entries
          if [ "$global_count" -eq 0 ]; then
            echo "❌ llms-full.txt has no entries — no markdown files found"
            exit 1
          fi
      
      - name: Validate llms.txt links
        run: |
          project="${{ inputs.project-name }}"
          
          echo "🔍 Validating llms.txt links against build output..."
          failed=0
          checked=0
          
          # Validate all llms.txt files (root + per-module)
          while IFS= read -r llms_file; do
            while read -r url; do
              path="${url#https://docs.21.dev/}"
              if [ ! -f "Websites/${project}/${path}" ]; then
                echo "❌ Dead link in ${llms_file}: ${path}"
                failed=$((failed + 1))
              fi
              checked=$((checked + 1))
            done < <(grep -oE 'https://docs\.21\.dev/[^)]+\.md' "$llms_file")
          done < <(find "Websites/${project}" -name "llms.txt" -type f)
          
          if [ "$checked" -eq 0 ]; then
            echo "ℹ️  No llms.txt files found for ${project}, skipping link validation"
            exit 0
          fi
          
          if [ "$failed" -gt 0 ]; then
            echo "❌ ${failed} dead link(s) found across llms.txt files"
            exit 1
          fi
          
          echo "✅ All ${checked} links verified across llms.txt files"
      
      - name: Create documentation archive
        run: |
          project="${{ inputs.project-name }}"
          echo "📦 Creating archive for ${project}..."
          
          # Create zip archive (avoids GitHub Actions path validation issues)
          # Zip FROM INSIDE the directory to avoid nesting
          cd "Websites/${project}"
          zip -r "../${project}.zip" .
          
          # Remove original directory to save space
          cd ..
          rm -rf "${project}"
          
          echo "✅ Archive created: Websites/${project}.zip"
          ls -lh "${project}.zip"
      
      - name: Upload documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.project-name }}
          path: Websites/${{ inputs.project-name }}.zip
          retention-days: 1
