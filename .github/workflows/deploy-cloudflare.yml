name: Deploy to Cloudflare Pages

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the build artifact to deploy'
        required: true
        type: string
      project-name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      deploy-to-production:
        description: 'Deploy to production (true) or preview (false)'
        required: true
        type: boolean
      artifact-path:
        description: 'Path where artifact should be extracted'
        required: false
        type: string
        default: 'Websites'
    secrets:
      cloudflare-api-token:
        required: true
      cloudflare-account-id:
        required: true
      cloudflare-zone-id:
        description: 'Cloudflare zone ID (21.dev) for edge cache purge on production deploys'
        required: false
      google-service-account-json:
        required: false
    outputs:
      deployment-url:
        description: 'The URL where the site was deployed'
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: macos-26
    env:
      DEPLOYMENT_BRANCH: preview
      DEVELOPER_DIR: "/Applications/Xcode_26.4.app/Contents/Developer"
    permissions:
      actions: read
      contents: read
      pull-requests: write
    outputs:
      url: ${{ steps.cloudflare.outputs.deployment-url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Determine deployment branch
        run: |
          if [[ ${{ inputs.deploy-to-production }} == true ]]; then
            echo "DEPLOYMENT_BRANCH=main" >> $GITHUB_ENV
            echo "🚀 Deploying to PRODUCTION (main branch)"
          else
            echo "DEPLOYMENT_BRANCH=preview" >> $GITHUB_ENV
            echo "🔍 Deploying to PREVIEW"
          fi
      
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}/${{ inputs.project-name }}
      
      - name: Extract artifact if zipped
        run: |
          deploy_dir="${{ inputs.artifact-path }}/${{ inputs.project-name }}"
          
          # Check if artifact is a zip file (docs workflow)
          if [ -f "${deploy_dir}/${{ inputs.project-name }}.zip" ]; then
            echo "📦 Extracting documentation archive..."
            unzip -q "${deploy_dir}/${{ inputs.project-name }}.zip" -d "${deploy_dir}"
            rm "${deploy_dir}/${{ inputs.project-name }}.zip"
            echo "✅ Documentation extracted and ready for deployment"
          fi
      
      - name: Install wrangler
        run: npm install -g wrangler@3
      
      - name: Copy Functions to repo root
        run: |
          functions_src="Resources/${{ inputs.project-name }}/functions"
          
          if [ ! -d "$functions_src" ]; then
            echo "❌ Error: Functions directory not found: $functions_src"
            exit 1
          fi
          
          # Wrangler expects functions/ as a sibling of the deploy directory
          cp -R "$functions_src" ./functions
          echo "✅ Copied $functions_src → ./functions/"
          
          if [ ! -f "./functions/_middleware.ts" ]; then
            echo "❌ Error: _middleware.ts not found in ./functions/"
            exit 1
          fi
          echo "✅ _middleware.ts present"
          
          if grep -q './logic.js' "./functions/_middleware.ts"; then
            if [ ! -f "./functions/logic.js" ]; then
              echo "❌ Error: _middleware.ts imports ./logic.js but file not found in ./functions/"
              exit 1
            fi
            echo "✅ logic.js present (imported by _middleware.ts)"
          fi
      
      - name: Deploy to Cloudflare Pages
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare-api-token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cloudflare-account-id }}
        run: |
          deploy_output=$(wrangler pages deploy \
            "${{ inputs.artifact-path }}/${{ inputs.project-name }}" \
            --project-name="${{ inputs.project-name }}" \
            --branch="${{ env.DEPLOYMENT_BRANCH }}" \
            2>&1)
          echo "$deploy_output"
          
          deployment_url=$(echo "$deploy_output" | grep -oE 'https://[a-zA-Z0-9._-]+\.pages\.dev' | head -1)
          if [ -z "$deployment_url" ]; then
            echo "::error::Failed to extract deployment URL from wrangler output"
            exit 1
          fi
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
      
      - name: Update deployment comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          swift run util comment \
            --pr ${{ github.event.pull_request.number }} \
            --project ${{ inputs.project-name }} \
            --status ${{ steps.cloudflare.outcome == 'success' && 'success' || 'failure' }} \
            --preview-url "${{ steps.cloudflare.outputs.deployment-url }}" \
            --alias-url "https://preview.${{ inputs.project-name }}.pages.dev" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      - name: Deployment complete
        run: |
          echo "✅ Deployment successful!"
          echo "📍 Deployment URL: ${{ steps.cloudflare.outputs.deployment-url }}"
          echo "🌿 Branch: ${{ env.DEPLOYMENT_BRANCH }}"
      
      - name: Verify redirects (docs.21.dev)
        if: inputs.deploy-to-production == false && inputs.project-name == 'docs-21-dev'
        run: |
          PREVIEW_URL="${{ steps.cloudflare.outputs.deployment-url }}"
          echo "🔍 Verifying redirects on preview: $PREVIEW_URL"
          
          # Test root redirect
          status=$(curl -sI -o /dev/null -w "%{http_code}" "${PREVIEW_URL}/")
          if [ "$status" != "301" ]; then
            echo "❌ ERROR: / expected 301, got $status"
            exit 1
          fi
          echo "✅ / → 301"
          
          # Test /p256k redirect
          status=$(curl -sI -o /dev/null -w "%{http_code}" "${PREVIEW_URL}/p256k")
          if [ "$status" != "301" ]; then
            echo "❌ ERROR: /p256k expected 301, got $status"
            exit 1
          fi
          echo "✅ /p256k → 301"
          
          echo "✓ All docs.21.dev redirects verified on preview"
      
      - name: Verify redirects (21.dev)
        if: inputs.deploy-to-production == false && inputs.project-name == '21-dev'
        run: |
          PREVIEW_URL="${{ steps.cloudflare.outputs.deployment-url }}"
          echo "🔍 Verifying redirects on preview: $PREVIEW_URL"
          
          # Test /docs redirect
          status=$(curl -sI -o /dev/null -w "%{http_code}" "${PREVIEW_URL}/docs")
          if [ "$status" != "301" ]; then
            echo "❌ ERROR: /docs expected 301, got $status"
            exit 1
          fi
          echo "✅ /docs → 301"
          
          # Test /api redirect
          status=$(curl -sI -o /dev/null -w "%{http_code}" "${PREVIEW_URL}/api")
          if [ "$status" != "301" ]; then
            echo "❌ ERROR: /api expected 301, got $status"
            exit 1
          fi
          echo "✅ /api → 301"
          
          echo "✓ All 21.dev redirects verified on preview"
      
      - name: Verify ETag + 304 revalidation (HTML pages)
        if: inputs.deploy-to-production == false
        run: |
          PREVIEW_URL="${{ steps.cloudflare.outputs.deployment-url }}"
          
          # Both site middlewares emit a weak ETag for text/html 200 responses.
          # Pick a per-site path that returns HTML (NOT a redirect), then round-trip
          # the ETag with If-None-Match to confirm 304 Not Modified.
          if [[ "${{ inputs.project-name }}" == "docs-21-dev" ]]; then
            TEST_PATH="/documentation/"
          else
            TEST_PATH="/"
          fi
          
          echo "🔍 Verifying ETag round-trip on ${PREVIEW_URL}${TEST_PATH}"
          
          # Step 1: confirm ETag is present on the 200 response
          headers=$(curl -sI "${PREVIEW_URL}${TEST_PATH}")
          etag=$(echo "$headers" | awk 'BEGIN{IGNORECASE=1} /^etag:/ {sub(/^etag:[[:space:]]*/, "", $0); print}' | tr -d '\r\n')
          
          if [ -z "$etag" ]; then
            echo "❌ ERROR: ETag header missing on ${TEST_PATH}"
            echo "--- response headers ---"
            echo "$headers"
            exit 1
          fi
          echo "✅ ETag present: $etag"
          
          # Step 2: confirm If-None-Match returns 304 for the same etag
          status=$(curl -sI -o /dev/null -w "%{http_code}" \
            -H "If-None-Match: $etag" \
            "${PREVIEW_URL}${TEST_PATH}")
          if [ "$status" != "304" ]; then
            echo "❌ ERROR: If-None-Match expected 304, got $status"
            exit 1
          fi
          echo "✅ If-None-Match → 304 Not Modified"
      
      - name: Purge Cloudflare cache (production only)
        if: inputs.deploy-to-production == true
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare-api-token }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.cloudflare-zone-id }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "⚠️  CLOUDFLARE_ZONE_ID secret not set; skipping cache purge"
            echo "   Add the secret to enable automatic edge cache invalidation on production deploys"
            exit 0
          fi

          echo "🧹 Purging Cloudflare edge cache for zone $CLOUDFLARE_ZONE_ID..."
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          success=$(echo "$response" | jq -r '.success')
          if [ "$success" = "true" ]; then
            echo "✅ Cache purge successful"
          else
            echo "❌ Cache purge failed"
            echo "$response" | jq .
            exit 1
          fi
      
      - name: Submit sitemap to Google Search Console
        if: inputs.deploy-to-production == true
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.google-service-account-json }}
        run: swift run util search-console submit --site ${{ inputs.project-name }} --verbose
