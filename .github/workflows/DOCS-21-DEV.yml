name: docs-21-dev

on:
  push:
    branches:
      - 'main'
    paths: &paths
      - '.github/workflows/generate-docc.yml'
      - '.github/workflows/deploy-cloudflare.yml'
      - '.github/workflows/DOCS-21-DEV.yml'
      - 'Resources/docs-21-dev/**'
      - 'Sources/docs-21-dev-P256K/**'
      - 'Sources/docs-21-dev-ZKP/**'
      - 'Sources/UtilLib/**'
      - 'Sources/util/**'
      - 'Package.swift'
      - 'Package.resolved'

  pull_request:
    branches:
      - 'main'
    paths: *paths

  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test Middleware Logic
    runs-on: macos-26
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: "/Applications/Xcode_26.4.app/Contents/Developer"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Cache Swift Package Manager
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      
      - name: Run middleware tests
        run: swift test --filter MiddlewareTests --parallel

  generate:
    name: Generate Documentation
    permissions:
      contents: read
    uses: ./.github/workflows/generate-docc.yml
    with:
      project-name: docs-21-dev
      targets: "P256K ZKP"
  
  deploy:
    name: Deploy Documentation
    needs: [test, generate]
    permissions:
      actions: read
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-cloudflare.yml
    with:
      artifact-name: ${{ needs.generate.outputs.artifact-name }}
      project-name: docs-21-dev
      deploy-to-production: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      cloudflare-zone-id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      google-service-account-json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
